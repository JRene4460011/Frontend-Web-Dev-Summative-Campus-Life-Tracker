<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Life Tracker</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body style="background-color: #f5f6fb;">
    <div class="dashboard">
        <button type="button" class="sidebar-toggle" aria-label="Open navigation menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <!-- THE LEFT SIDE -->
        <aside class="sidebar"> 
            <button type="button" class="sidebar-close" aria-label="Close navigation menu">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="brand">
                <span class="brand-mark">C</span>
                <div>
                    <p class="eyebrow">Campus Life</p>
                    <h3>Tracker</h3>
                </div>
            </div>
            <nav>
                <ul>
                    <li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
                    <li><a href="add_record.html"><i class="fa-solid fa-list-check"></i> Add Record</a></li>
                    <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
                </ul>
            </nav>  
            <div class="bottom-of-sidebar">
                <button class="logout-button"><i class="fa-solid fa-sign-out"> </i>Logout</button>
            </div>
        </aside>
        <div class="sidebar-backdrop" aria-hidden="true"></div>

        <!-- THE RIGHT SIDE -->
        <main class="main-content">
            <!-- The Dashboard title is here -->
            <header>
                <h3> Dashboard </h3>
            </header>
            <!-- <h1>Welcome to CALI Tracker</h1>
            <p>Here you can manage your events and tasks efficiently.</p> -->
            <section class="add-record-form">
                <p> NEW PLAN</p>
                <h3> Add a new plan (task/event) </h3>

                <form id="record-form" class="record-form">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="title">Title</label> <br>
                            <input type="text" id="title" name="title" required> <br>
                            <small class="error" id="title-error"></small>
                        </div>
                        <div class="input-group">
                            <label for="duedate">Due Date</label> <br>
                            <input type="date" id="duedate" name="duedate" required> <br>
                            <small class="error" id="duedate-error"></small>
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="duration">Duration</label> <br>
                            <input type="number" min="1" id="duration" name="duration" placeholder="Minutes" required> <br>
                            <small class="error" id="duration-error"></small>
                        </div>
                        <div class="input-group">
                            <label for="tag">Tag</label> <br>
                            <input type="text" id="tag" name="tag" required> <br>
                            <small class="error" id="tag-error"></small>
                        </div>
                    </div>
                    <button type="submit">Add Plan</button>
                    <button type="reset" id="clear">Clear</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
