<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Life Tracker</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body style="background-color: #f5f6fb;">
    <div class="dashboard">

        <!-- THE LEFT SIDE -->
        <aside class="sidebar"> 
            <div class="brand">
                <span class="brand-mark">C</span>
                <div>
                    <p class="eyebrow">Campus Life</p>
                    <h3>Tracker</h3>
                </div>
            </div>
            <nav>
                <ul>
                    <li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
                    <li><a href="add_record.html"><i class="fa-solid fa-list-check"></i> Add Record</a></li>
                    <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
                </ul>
            </nav>  
            <div class="bottom-of-sidebar">
                <button class="logout-button"><i class="fa-solid fa-sign-out"> </i>Logout</button>
            </div>
        </aside>

        <!-- THE RIGHT SIDE -->
        <main class="main-content">
            <!-- The Dashboard title is here -->
            <header>
                <h3> Dashboard </h3>
            </header>
            <!-- <h1>Welcome to CALI Tracker</h1>
            <p>Here you can manage your events and tasks efficiently.</p> -->
            <section class="configure-settings">
                <p> PREFERENCES </p>
                <h3> Manage your preferences </h3>
                <form>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="weeklycap">Weekly Cap</label> <br>
                            <input type="number" min="1" id="weeklycap" name="weeklycap" required>
                        </div>
                        <div class="input-group">
                            <label for="durationunit">Duration Unit</label> <br>
                            <select id="durationunit">
                                <option value="minutes">Minutes</option>
                                <option value="hours">Hours</option>
                            </select>
                        </div>
                    </div>
                    <p> Target total duration of the week.</p>
                    <button type="submit">Save settings</button>
                </form>

                
            </section>
        </main>
    </div>
    <script src="scripts/settings.js"></script>
</body>
</html>
